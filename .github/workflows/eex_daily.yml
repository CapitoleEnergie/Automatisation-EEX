name: EEX Daily Price Collection

on:
  schedule:
    - cron: "0 1 * * 1-5"    # hiver : 1h00 UTC = 2h00 CET
    - cron: "0 0 * * 1-5"    # été   : 0h00 UTC = 2h00 CEST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt python-dateutil

      - name: Run collector
        run: python scripts/collect_eex.py

      - name: Commit & push Excel
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eex_prix.xlsx
          git diff --cached --quiet || git commit -m "data: EEX prices $(date +'%Y-%m-%d')"
          git push

      # ---------------------------------------------------------------
      # Nouveau step : upload vers SharePoint via Microsoft Graph API
      # ---------------------------------------------------------------
      - name: Upload to SharePoint
        env:
          SP_TENANT_ID:     ${{ secrets.SP_TENANT_ID }}
          SP_CLIENT_ID:     ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          SP_SITE_ID:       ${{ secrets.SP_SITE_ID }}
          SP_DRIVE_ID:      ${{ secrets.SP_DRIVE_ID }}
        run: python scripts/upload_sharepoint.py
