name: EEX Daily Price Collection

on:
  schedule:
    # 9h15 CET = 8h15 UTC (hiver) / 7h15 UTC (été)
    # On lance les deux pour couvrir le changement d'heure
    - cron: "15 8 * * 1-5"   # hiver (CET = UTC+1)
    - cron: "15 7 * * 1-5"   # été   (CEST = UTC+2)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt python-dateutil

      - name: Run collector
        run: python scripts/collect_eex.py

      - name: Commit & push Excel
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/eex_prix.xlsx
          git diff --cached --quiet || git commit -m "data: EEX prices $(date +'%Y-%m-%d')"
          git push
